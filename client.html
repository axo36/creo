<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILEY – Clients</title>
    <link rel="stylesheet" href="stylec.css">
</head>
<body>

<nav id="sideMenu">
    <button id="closeBtn" class="close">✖</button>

    <ul class="menu-ligne-text">
        <a href="">Accueil</a>
        <a href="client.html" class="active">Clients</a>
        <a href="gestionaire-clef.html">Gestion de la toile</a>
        <a href="parametre.html">Parametre</a>
        <a id="logoutBtnMenu" class="active2">Se déconnecter</a>
    </ul>
</nav>

<main id="content">
    <header class="box-title">
        <button id="openBtn">☰</button>
        <h1 class="title">FILEY</h1>

        <div class="account-wrapper">
            <button id="accountBtn" class="account-btn">
                <img id="avatarIcon" src="asset/profile.jpg" alt="avatar">
            </button>

            <div id="accountPopup" class="account-dropdown hidden">
                <div class="account-top">
                    <img id="popupAvatar" class="popup-avatar" src="asset/profile.jpg" alt="avatar">
                    <div>
                        <div id="popupUsername" class="popup-username"></div>
                        <div id="popupEmail" class="popup-email"></div>
                    </div>
                </div>

                <div class="account-separator"></div>

                <button id="logoutBtnPopup" class="logout-btn">Se déconnecter</button>
            </div>
        </div>
    </header>

    <div class="clien">
        <input type="text" class="search" placeholder="Search for a client" id="searchInput">
        <div id="clientsContainer" class="clients-grid"></div>
    </div>
</main>

<script type="module" src="protect.js"></script>
<script src="client.js"></script>
</body>
</html>
