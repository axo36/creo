<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILEY</title>
    <link rel="stylesheet" href="stylec.css" />

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav id="sideMenu">
        <button id="closeBtn" class="close">✖</button>

        <ul class="menu-ligne-text">
            <a href="">Accueil</a>
            <a href="client.html" class="active">Clients</a>
            <a href="gestionaire-clef.html">Gestion de la toile</a>
        </ul>

        <button id="logoutBtn" style="margin-top:20px;">Se déconnecter</button>
    </nav>

    <main id="content">
        <header class="box-title">
            <button id="openBtn">☰</button>
            <h1 class="title">FILEY</h1>
        </header>

        <div class="clien">
            <input type="text" class="search" placeholder="Search for a client" id="searchInput">
            <div id="clientsContainer" class="clients-grid"></div>
        </div>
    </main>

    <script>
    /* ------------------------------
       CONFIG SUPABASE
    --------------------------------*/
    const supabaseClient = supabase.createClient(
        "https://TON-PROJET.supabase.co",   // ← remplace
        "TON-ANON-KEY"                      // ← remplace
    );

    /* ------------------------------
       PROTECTION DE LA PAGE
    --------------------------------*/
    supabaseClient.auth.getSession().then(({ data }) => {
        if (!data.session) {
            // Pas connecté → retour à la page login
            window.location.href = "index.html";
            return;
        }

        // Affiche l'utilisateur connecté dans la console
        console.log("Utilisateur connecté :", data.session.user);
    });

    /* ------------------------------
       DÉCONNEXION
    --------------------------------*/
    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.href = "index.html";
    }

    document.getElementById("logoutBtn").addEventListener("click", logout);
    </script>

    <script src="client.js"></script>
</body>
</html>
