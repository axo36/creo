<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILEY – Clients</title>
    <link rel="stylesheet" href="stylec.css">
</head>
<body>

<nav id="sideMenu">
    <button id="closeBtn" class="close">✖</button>

    <ul class="menu-ligne-text">
        <a href="">Accueil</a>
        <a href="client.html" class="active">Clients</a>
        <a href="gestionaire-clef.html">Gestion de la toile</a>
    </ul>

    <button id="menuAccountBtn">Mon compte</button>
    <button id="logoutBtnMenu">Se déconnecter</button>
</nav>

<main id="content">
    <header class="box-title">
        <button id="openBtn">☰</button>
        <h1 class="title">FILEY</h1>

        <!-- LOGO COMPTE -->
        <div class="account-icon">
            <img id="avatarIcon" src="https://api.dicebear.com/7.x/identicon/svg?seed=user" alt="avatar">
        </div>

        <!-- POPUP COMPTE -->
        <div id="accountPopup" class="account-popup hidden">
            <img id="popupAvatar" class="popup-avatar" src="" alt="avatar">
            <h3 id="popupUsername"></h3>
            <p id="popupEmail"></p>

            <button id="logoutBtnPopup">Se déconnecter</button>
        </div>
    </header>

    <div class="clien">
        <input type="text" class="search" placeholder="Search for a client" id="searchInput">
        <div id="clientsContainer" class="clients-grid"></div>
    </div>
</main>

<script type="module" src="protect.js"></script>
<script src="client.js"></script>

</body>
</html>
