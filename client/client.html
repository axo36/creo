<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREO — Chargement…</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#080c14;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'JetBrains Mono',monospace;}
  .spinner{display:flex;flex-direction:column;align-items:center;gap:1.2rem;}
  .dot-row{display:flex;gap:.5rem;}
  .dot{width:7px;height:7px;border-radius:50%;background:#1a6fff;animation:pulse 1.2s ease-in-out infinite;}
  .dot:nth-child(2){animation-delay:.2s;}
  .dot:nth-child(3){animation-delay:.4s;}
  @keyframes pulse{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1.1);}}
  .txt{font-size:.7rem;color:#555;letter-spacing:.15em;text-transform:uppercase;}
</style>
</head>
<body>
<div class="spinner">
  <div class="dot-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="txt" id="msg">Connexion…</div>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient(
  'https://mpnfvrizbluhhjcfzztc.supabase.co',
  'sb_publishable_PMOkki7SEbuv11glUpmNTQ_7KTnMrEr'
);
const msg = document.getElementById('msg');
async function route() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = '/creo/login/login.html'; return; }
  msg.textContent = 'Vérification du profil…';
  const { data: profile } = await supabase
    .from('profiles').select('type,username,client_code')
    .eq('id', session.user.id).single();
  if (!profile?.username || !profile?.client_code || !profile?.type) {
    window.location.href = '/creo/login/complete-profile.html'; return;
  }
  const role = profile.type.toLowerCase();
  if (role === 'admin' || role === 'sous-admin') {
    msg.textContent = 'Accès administration…';
    window.location.href = '/creo/client/admin/admin.html';
  } else {
    msg.textContent = 'Chargement…';
    window.location.href = '/creo/client/public/client.html';
  }
}
route();
</script>
</body>
</html>
