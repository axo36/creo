<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creo — Vérification email</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div class="grid-bg"></div>

<div class="auth-page">
  <div class="auth-wrap">
    <a href="index.html" class="auth-logo">CR<span class="logo-e-login">E</span>O</a>
    <p class="auth-tagline">// Transfer Without Limits</p>

    <div class="auth-box" style="text-align:center;padding:2.5rem 2rem;">

      <!-- CHARGEMENT -->
      <div id="state-loading">
        <div class="spinner" style="width:2.5rem;height:2.5rem;margin:1.5rem auto;border-width:3px;"></div>
        <p style="color:var(--t2);margin-top:1rem;">Vérification en cours…</p>
      </div>

      <!-- SUCCÈS -->
      <div id="state-success" style="display:none;">
        <div style="font-size:3rem;margin-bottom:1rem;">✅</div>
        <div class="confirm-title" style="margin-bottom:.75rem;">Email vérifié !</div>
        <p class="confirm-text">Votre compte Creo est activé. Vous pouvez maintenant vous connecter.</p>
        <a href="login.html" class="btn btn-primary btn-full" style="margin-top:1.5rem;display:inline-block;">
          Se connecter →
        </a>
      </div>

      <!-- ERREUR -->
      <div id="state-error" style="display:none;">
        <div style="font-size:3rem;margin-bottom:1rem;">❌</div>
        <div class="confirm-title" style="margin-bottom:.75rem;">Lien invalide</div>
        <p class="confirm-text" id="error-msg">Ce lien est invalide ou a déjà été utilisé.</p>
        <a href="login.html" class="btn btn-ghost btn-full" style="margin-top:1.5rem;display:inline-block;">
          ← Retour à la connexion
        </a>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { supabase } from "./app.js";

  const params = new URLSearchParams(window.location.search);
  const token  = params.get("token");

  function show(state) {
    ["loading","success","error"].forEach(s => {
      document.getElementById("state-"+s).style.display = s === state ? "block" : "none";
    });
  }

  async function verify() {
    if (!token) { show("error"); return; }

    // 1. Trouver le token
    const { data: row, error: fetchErr } = await supabase
      .from("email_verification")
      .select("user_id, email, first_name, last_name, created_at")
      .eq("token", token)
      .single();

    if (fetchErr || !row) {
      document.getElementById("error-msg").textContent =
        "Ce lien est invalide ou a déjà été utilisé.";
      show("error");
      return;
    }

    // 2. Vérifier expiration 24h
    const diffH = (Date.now() - new Date(row.created_at)) / 3600000;
    if (diffH > 24) {
      await supabase.from("email_verification").delete().eq("token", token);
      document.getElementById("error-msg").textContent =
        "Ce lien a expiré (valable 24h). Recréez un compte pour en recevoir un nouveau.";
      show("error");
      return;
    }

    // 3. Créer le profil (client_code unique)
    const clientCode = "CRE-" + Math.random().toString(36).substring(2,8).toUpperCase();

    const { error: profileErr } = await supabase
      .from("profiles")
      .upsert({
        id:             row.user_id,
        email:          row.email,
        email_verified: true,
        first_name:     row.first_name || null,
        last_name:      row.last_name  || null,
        client_code:    clientCode
      }, { onConflict: "id" });

    if (profileErr) {
      document.getElementById("error-msg").textContent =
        "Erreur activation : " + profileErr.message;
      show("error");
      return;
    }

    // 4. Supprimer le token (usage unique)
    await supabase.from("email_verification").delete().eq("token", token);

    // 5. Succès
    show("success");
  }

  verify();
</script>
</body>
</html>
