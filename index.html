<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion - Tech Neo</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        height: 100vh;
        background: #0a0f1a;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        color: white;
    }

    /* Glow bleu néon en bas */
    body::after {
        content: "";
        position: absolute;
        bottom: -150px;
        left: 50%;
        transform: translateX(-50%);
        width: 1200px;
        height: 400px;
        background: radial-gradient(circle, rgba(0,140,255,0.8), transparent 70%);
        filter: blur(80px);
        z-index: -1;
    }

    .card {
        width: 380px;
        padding: 32px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px;
        backdrop-filter: blur(12px);
        box-shadow: 0 0 25px rgba(0,140,255,0.2);
        animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        text-align: center;
        margin-bottom: 10px;
        font-size: 1.8rem;
        font-weight: 600;
    }

    p {
        text-align: center;
        margin-bottom: 25px;
        color: #9bb3d1;
        font-size: 0.9rem;
    }

    label {
        font-size: 0.9rem;
        margin-bottom: 6px;
        display: block;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        margin-bottom: 18px;
        background: rgba(255,255,255,0.1);
        color: white;
        outline: none;
        font-size: 1rem;
    }

    input:focus {
        box-shadow: 0 0 10px rgba(0,140,255,0.6);
        border: 1px solid #008cff;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: #008cff;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 5px;
        transition: 0.2s;
    }

    .btn:hover {
        background: #0a9aff;
        box-shadow: 0 0 15px #008cff;
    }

    .divider {
        text-align: center;
        margin: 18px 0;
        color: #7a8aa6;
        font-size: 0.85rem;
    }

    .social {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .social button {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.08);
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }

    .social button:hover {
        background: rgba(255,255,255,0.15);
    }

    .bottom {
        margin-top: 15px;
        text-align: center;
        font-size: 0.9rem;
    }

    .bottom a {
        color: #0a9aff;
        text-decoration: none;
    }

    .bottom a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<div class="card">
    <h1>Connexion</h1>
    <p>Accède à ton espace sécurisé</p>

    <label>Email</label>
    <input type="email" id="email" placeholder="exemple@mail.com">

    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••">

    <button class="btn" onclick="login()">Se connecter</button>

    <div class="divider">ou</div>

    <div class="social">
        <button onclick="googleLogin()">Continuer avec Google</button>
        <button onclick="githubLogin()">Continuer avec GitHub</button>
    </div>

    <div class="bottom">
        Pas de compte ?
        <a href="#" onclick="createAccount()">Créer un compte</a>
    </div>
</div>

<script>
function login() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    if (!email || !pass) {
        alert("Veuillez remplir tous les champs");
        return;
    }

    alert("Connexion (démo) : " + email);
}

function googleLogin() {
    alert("Redirection Google (démo)");
}

function githubLogin() {
    alert("Redirection GitHub (démo)");
}

function createAccount() {
    alert("Page création de compte (démo)");
}
</script>

</body>
</html>
