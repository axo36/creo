<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1f2933, #111827);
      color: #111827;
    }

    .container {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      padding: 32px 28px;
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    .title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
      color: #111827;
    }

    .subtitle {
      font-size: 0.9rem;
      text-align: center;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: #374151;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.25);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      font-size: 0.85rem;
    }

    .row a {
      color: #2563eb;
      text-decoration: none;
    }

    .row a:hover {
      text-decoration: underline;
    }

    .btn-primary {
      width: 100%;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-primary:active {
      transform: translateY(1px);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .divider span {
      margin: 0 10px;
      white-space: nowrap;
    }

    .social-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.05s;
    }

    .btn-social:hover {
      background: #f3f4f6;
      border-color: #9ca3af;
    }

    .btn-social:active {
      transform: translateY(1px);
    }

    .btn-social span.icon {
      font-size: 1.1rem;
    }

    .bottom-text {
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 8px;
    }

    .bottom-text a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    .bottom-text a:hover {
      text-decoration: underline;
    }

    .error {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #b91c1c;
      display: none;
    }

    @media (max-width: 480px) {
      .container {
        margin: 0 16px;
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">Connexion</h1>
    <p class="subtitle">Connecte-toi avec ton email ou via Google / GitHub.</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="ton.email@example.com" required />
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" placeholder="••••••••" required />
      </div>

      <div class="row">
        <div>
          <input id="remember" type="checkbox" />
          <label for="remember">Se souvenir de moi</label>
        </div>
        <a href="#">Mot de passe oublié ?</a>
      </div>

      <button type="submit" class="btn-primary">Se connecter</button>
      <div id="errorMsg" class="error">Veuillez entrer un email et un mot de passe valides.</div>
    </form>

    <div class="divider">
      <span>ou continuer avec</span>
    </div>

    <div class="social-buttons">
      <button class="btn-social" id="googleBtn">
        <span class="icon">🟢</span>
        <span>Google</span>
      </button>
      <button class="btn-social" id="githubBtn">
        <span class="icon">🐙</span>
        <span>GitHub</span>
      </button>
    </div>

    <p class="bottom-text">
      Pas encore de compte ?
      <a href="#" id="createAccountLink">Créer un compte</a>
    </p>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");
    const googleBtn = document.getElementById("googleBtn");
    const githubBtn = document.getElementById("githubBtn");
    const createAccountLink = document.getElementById("createAccountLink");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        errorMsg.style.display = "block";
        return;
      }

      errorMsg.style.display = "none";

      // Ici tu mets ton appel API / redirection réelle
      console.log("Connexion avec email/mot de passe :", { email, password });
      alert("Connexion (demo) avec : " + email);
    });

    googleBtn.addEventListener("click", () => {
      // Remplace par ton URL OAuth Google
      console.log("Connexion avec Google");
      alert("Redirection vers Google (demo)");
    });

    githubBtn.addEventListener("click", () => {
      // Remplace par ton URL OAuth GitHub
      console.log("Connexion avec GitHub");
      alert("Redirection vers GitHub (demo)");
    });

    createAccountLink.addEventListener("click", (e) => {
      e.preventDefault();
      // Tu peux rediriger vers une page d'inscription
      console.log("Redirection vers la création de compte");
      alert("Page de création de compte (demo)");
    });
  </script>
</body>
</html>
