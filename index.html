<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion - FILEY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
  body {
    height: 100vh;
    background: #050a12;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
  }
  body::after {
    content: "";
    position: absolute;
    bottom: -150px;
    left: 50%;
    transform: translateX(-50%);
    width: 1200px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,140,255,0.8), transparent 70%);
    filter: blur(80px);
    z-index: -1;
  }
  .card {
    width: 380px;
    padding: 32px;
    background: rgb(33 33 33);
    border: 1px solid rgb(106 195 255 / 76%);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 25px rgb(4 142 255 / 37%);
  }
  h1 { text-align: center; margin-bottom: 10px; font-size: 1.8rem; }
  p { text-align: center; margin-bottom: 25px; color: #9bb3d1; }
  label { font-size: 0.9rem; margin-bottom: 6px; display: block; }
  input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
    font-size: 1rem;
  }
  .btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #008cff;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 5px;
    transition: 0.2s;
  }
  .btn:hover {
    background: #0a9aff;
    box-shadow: 0 0 15px #008cff;
  }
  .divider { text-align: center; margin: 18px 0; color: #7a8aa6; }
  .social { display: flex; flex-direction: column; gap: 10px; }
  .social button {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: white;
    cursor: pointer;
    transition: 0.2s;
  }
  .social button:hover { background: rgba(255,255,255,0.15); }
</style>
</head>

<body>

<div class="card">
  <h1>Connexion</h1>
  <p>Accès réservé</p>

  <label>Email</label>
  <input type="email" id="email" placeholder="exemple@mail.com">

  <label>Mot de passe</label>
  <input type="password" id="password" placeholder="••••••••">

  <button class="btn" id="loginBtn">Se connecter</button>

  <div class="divider">ou</div>

  <div class="social">
    <button id="googleBtn">Google</button>
    <button id="githubBtn">GitHub</button>
  </div>
</div>

<!-- ⭐ IMPORTANT : FICHIER EXTERNE -->
<script type="module" src="login.js"></script>

</body>
</html>
