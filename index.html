<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion - FILEY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
  body {
    height: 100vh;
    background: #050a12;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
  }
  body::after {
    content: "";
    position: absolute;
    bottom: -150px;
    left: 50%;
    transform: translateX(-50%);
    width: 1200px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,140,255,0.8), transparent 70%);
    filter: blur(80px);
    z-index: -1;
  }
  .card {
    width: 380px;
    padding: 32px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 25px rgba(0,140,255,0.2);
  }
  h1 { text-align: center; margin-bottom: 10px; font-size: 1.8rem; }
  p { text-align: center; margin-bottom: 25px; color: #9bb3d1; }
  label { font-size: 0.9rem; margin-bottom: 6px; display: block; }
  input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
    font-size: 1rem;
  }
  .btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #008cff;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 5px;
    transition: 0.2s;
  }
  .btn:hover {
    background: #0a9aff;
    box-shadow: 0 0 15px #008cff;
  }
  .divider { text-align: center; margin: 18px 0; color: #7a8aa6; }
  .social { display: flex; flex-direction: column; gap: 10px; }
  .social button {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: white;
    cursor: pointer;
    transition: 0.2s;
  }
  .social button:hover { background: rgba(255,255,255,0.15); }

  /* Overlay + mini fenêtre */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 50;
  }
  #miniWindow {
    width: 360px;
    padding: 25px;
    background: rgba(255,255,255,0.08);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.2);
    text-align: center;
    box-shadow: 0 0 25px rgba(0,140,255,0.3);
    animation: pop 0.25s ease;
  }
  @keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>

<body>

<div class="card">
  <h1>Connexion</h1>
  <p>Accès réservé</p>

  <label>Email</label>
  <input type="email" id="email" placeholder="exemple@mail.com">

  <label>Mot de passe</label>
  <input type="password" id="password" placeholder="••••••••">

  <button class="btn" id="loginBtn">Se connecter</button>

  <div class="divider">ou</div>

  <div class="social">
    <button id="googleBtn">Google</button>
    <button id="githubBtn">GitHub</button>
  </div>
</div>

<!-- Mini fenêtre -->
<div id="overlay">
  <div id="miniWindow">
    <h2>Connexion en cours…</h2>
    <p>Veuillez terminer la connexion dans la fenêtre Google/GitHub.</p>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://tjiqssgrxvxnjqhewtrt.supabase.co",
  "sb_publishable_IUb-C1nf11c98QajH_MTVw_8ZQGhMWp"
);

// Si déjà connecté → accès direct
supabase.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = "client.html";
});

// Affiche la mini fenêtre
function showMini() {
  document.getElementById("overlay").style.display = "flex";
}

// Connexion email
document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password: pass
  });

  if (error) return alert("Accès refusé");

  window.location.href = "client.html";
};

// Google
document.getElementById("googleBtn").onclick = async () => {
  showMini();
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: window.location.origin + "/client.html" }
  });
};

// GitHub
document.getElementById("githubBtn").onclick = async () => {
  showMini();
  await supabase.auth.signInWithOAuth({
    provider: "github",
    options: { redirectTo: window.location.origin + "/client.html" }
  });
};
</script>

</body>
</html>
