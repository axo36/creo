<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creo — Connexion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div class="grid-bg"></div>
<div class="auth-page">
  <div class="auth-wrap">
    <a href="index.html" class="auth-logo">CR<span class="logo-e-login">E</span>O</a>
    <div class="auth-box" style="text-align:center;padding:2.5rem 2rem;">
      <div class="spinner" style="width:2.2rem;height:2.2rem;margin:0 auto;border-width:3px;"></div>
      <p style="color:var(--t2);margin-top:1.2rem;font-size:.85rem;">Connexion en cours…</p>
    </div>
  </div>
</div>

<script type="module">
import { supabase, generateTempCode } from "./app.js";

async function handleOAuth() {
  // Attendre que Supabase récupère la session depuis l'URL
  const { data: { session }, error } = await supabase.auth.getSession();

  if (error || !session) {
    window.location.href = "login.html";
    return;
  }

  const user = session.user;
  const meta = user.user_metadata;

  // Upsert profil avec les infos OAuth
  const fullName  = meta?.full_name || meta?.name || "";
  const firstName = meta?.given_name  || fullName.split(" ")[0] || "";
  const lastName  = meta?.family_name || fullName.split(" ").slice(1).join(" ") || "";

  await supabase.from("profiles").upsert({
    id:             user.id,
    email:          user.email,
    email_verified: true,
    first_name:     firstName,
    last_name:      lastName,
    avatar_url:     meta?.avatar_url || meta?.picture || null
  }, { onConflict: "id" });

  // Vérifier si profil complet
  const { data: profile } = await supabase
    .from("profiles")
    .select("username, client_code, type")
    .eq("id", user.id)
    .single();

  if (!profile?.username || !profile?.client_code || !profile?.type) {
    const code = await generateTempCode(user.id);
    window.location.href = "complete-profile.html?code=" + code;
  } else {
    window.location.href = "/client/client.html";
  }
}

handleOAuth();
</script>
</body>
</html>
