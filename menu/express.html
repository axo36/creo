<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creo — Express</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .express-shell {
      max-width: 880px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 18px;
      background: var(--d2);
      border-radius: var(--r-2xl);
      border: 1px solid var(--b2);
      padding: 2.2rem 2.2rem;
    }
    .express-col {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }
    .express-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    /* Zone de dépôt */
    .express-drop {
      background: var(--d3);
      border-radius: var(--r-xl);
      border: 1px dashed var(--b3);
      padding: 2.4rem 1.8rem;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
    }
    .express-drop:hover {
      border-color: var(--blue2);
      background: var(--d4);
    }
    .express-drop.dragover {
      border-color: var(--blue);
      background: rgba(26,111,255,.08);
    }
    .ed-icon {
      font-size: 2.6rem;
      margin-bottom: .6rem;
    }
    .ed-title {
      font-size: 1.05rem;
      color: var(--t1);
    }
    .ed-sub {
      font-size: .85rem;
      color: var(--t2);
      margin-top: .2rem;
    }

    /* Aperçu fichiers */
    .express-file {
      display: none;
      flex-direction: column;
      gap: 10px;
      background: var(--d3);
      border-radius: var(--r-xl);
      border: 1px solid var(--b2);
      padding: 1rem 1.2rem;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .file-item-icon {
      font-size: 1.6rem;
      color: var(--blue2);
    }
    .file-item-name {
      font-size: .9rem;
      color: var(--t1);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-item-meta {
      font-size: .75rem;
      color: var(--t3);
    }

    .ef-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      color: var(--blue2);
      margin-top: 6px;
    }

    .input-field {
      padding: .85rem 1rem;
      border-radius: var(--r-lg);
      border: 1px solid var(--b2);
      background: var(--d3);
      color: var(--t1);
      font-size: .9rem;
      transition: border .2s, background .2s;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--blue2);
      background: var(--d4);
    }

    .express-note {
      font-size: .8rem;
      color: var(--t3);
      line-height: 1.6;
    }
    .express-sec {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .8rem;
      color: var(--t3);
    }
    .express-sec-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      flex-shrink: 0;
    }

    @media (max-width: 900px) {
      .express-shell {
        grid-template-columns: 1fr;
        padding: 1.8rem 1.6rem;
      }
    }
  </style>
</head>

<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
</div>
<nav id="nav"></nav>

<div class="sub-hero">
  <div class="grid-bg"></div>
  <div class="tag">Envoi rapide</div>
  <h1 class="sub-hero-h1 grad-text">EXPRESS.</h1>
  <p class="sub-hero-desc">
    Dépose un fichier, choisis un pseudo, envoie.  
    Pas de compte, pas de configuration, juste un transfert simple.
  </p>
</div>

<div class="section-wrap">
  <div class="express-shell">

    <!-- COLONNE FICHIER -->
    <div class="express-col">
      <div class="express-label">// Fichier</div>

      <div class="express-drop" id="drop-zone">
        <div class="ed-icon">📁</div>
        <div class="ed-title">Déposer un fichier</div>
        <div class="ed-sub">ou cliquer pour parcourir</div>
        <input type="file" id="file-input" multiple hidden>
      </div>

      <div class="express-file" id="file-preview"></div>

      <div class="ef-status" id="file-status">Aucun fichier sélectionné.</div>
    </div>

    <!-- COLONNE DESTINATAIRE -->
    <div class="express-col">
      <div class="express-label">// Destinataire</div>

      <div class="input-wrap">
        <label class="input-label">Pseudo</label>
        <input type="text" id="pseudo" class="input-field" placeholder="ex : mathis_42">
      </div>

      <div class="input-wrap">
        <label class="input-label">Message (optionnel)</label>
        <input type="text" id="message" class="input-field" placeholder="ex : Voici ton fichier">
      </div>

      <button class="btn btn-primary btn-lg btn-full" id="send-btn">
        <span class="btn-label">Envoyer</span>
