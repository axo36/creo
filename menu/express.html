<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creo — Express</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* CONTAINER */
    .express-shell {
      max-width: 880px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 22px;
      background: var(--d2);
      border: 1px solid var(--b2);
      border-radius: var(--r-2xl);
      padding: 2.2rem;
    }

    .express-col {
      display: flex;
      flex-direction: column;
    }

    .express-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: .75rem;
      color: var(--t3);
      margin-bottom: 1rem;
      letter-spacing: .1em;
    }

    /* DROPZONE */
    .file-drop {
      border: 2px dashed var(--b3);
      background: var(--d3);
      border-radius: var(--r-xl);
      padding: 2.8rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: .25s;
    }
    .file-drop:hover {
      border-color: var(--blue2);
      background: var(--d4);
    }
    .file-drop.dragover {
      border-color: var(--blue);
      background: rgba(26,111,255,.08);
    }
    .file-drop-icon {
      font-size: 3rem;
      margin-bottom: .6rem;
    }
    .file-drop-text {
      color: var(--t2);
      font-size: .9rem;
    }

    /* FILE STATUS */
    .file-status {
      margin-top: 1.4rem;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--d3);
      border: 1px solid var(--b2);
      padding: 1rem 1.2rem;
      border-radius: var(--r-lg);
    }
    .file-status-icon {
      font-size: 1.6rem;
    }
    .file-status-title {
      color: var(--t1);
      font-weight: 600;
    }
    .file-status-sub {
      color: var(--t3);
      font-size: .8rem;
    }

    /* INPUTS */
    .input-field {
      width: 100%;
      padding: .9rem 1.2rem;
      background: var(--d3);
      border: 1px solid var(--b2);
      border-radius: var(--r-lg);
      color: var(--t1);
      font-size: .9rem;
      margin-bottom: 1rem;
    }
    .input-field:focus {
      border-color: var(--blue2);
      outline: none;
    }

    /* BUTTON */
    .send-btn {
      width: 100%;
      padding: 1rem;
      background: var(--blue);
      border: none;
      border-radius: var(--r-lg);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: .2s;
    }
    .send-btn:hover {
      background: var(--blue2);
    }

    /* INFO */
    .express-info {
      margin-top: 1rem;
      color: var(--t3);
      font-size: .8rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .green-dot {
      width: 9px;
      height: 9px;
      background: #3cff6a;
      border-radius: 50%;
    }

    .express-note {
      margin-top: .6rem;
      color: var(--t3);
      font-size: .75rem;
    }
  </style>
</head>

<body>

<div class="express-shell">

  <!-- COLONNE FICHIER -->
  <div class="express-col">
    <div class="express-label">// FICHIER</div>

    <div class="file-drop" id="file-drop">
      <div class="file-drop-icon">📁</div>
      <div class="file-drop-text">Déposer un fichier ou cliquer pour parcourir</div>
      <input type="file" id="file-input" multiple hidden>
    </div>

    <div class="file-status">
      <div class="file-status-icon">📄</div>
      <div>
        <div class="file-status-title">Prêt</div>
        <div class="file-status-sub" id="file-status-sub">Aucun fichier sélectionné</div>
      </div>
    </div>
  </div>

  <!-- COLONNE DESTINATAIRE -->
  <div class="express-col">
    <div class="express-label">// DESTINATAIRE</div>

    <input type="text" id="pseudo" class="input-field" placeholder="Pseudo ex : mathis_42">
    <input type="text" id="message" class="input-field" placeholder="Message (optionnel) ex : Voici ton fichier">

    <button class="send-btn" id="send-btn">Envoyer</button>

    <div class="express-info">
      Transfert chiffré. Le fichier est supprimé automatiquement après réception.
      <span class="green-dot"></span>
    </div>

    <div class="express-note">
      Le mode Express est pensé pour les partages rapides : ordinateur public, ami, camarade de classe, collègue ponctuel.
    </div>
  </div>

</div>

<script type="module">
  import { toast, setLoading } from './app.js';

  const drop = document.getElementById("file-drop");
  const fileInput = document.getElementById("file-input");
  const fileStatusSub = document.getElementById("file-status-sub");
  const sendBtn = document.getElementById("send-btn");

  drop.addEventListener("click", () => fileInput.click());

  drop.addEventListener("dragover", e => {
    e.preventDefault();
    drop.classList.add("dragover");
  });
  drop.addEventListener("dragleave", () => drop.classList.remove("dragover"));
  drop.addEventListener("drop", e => {
    e.preventDefault();
    drop.classList.remove("dragover");
    handleFiles(e.dataTransfer.files);
  });

  fileInput.addEventListener("change", e => handleFiles(e.target.files));

  function handleFiles(files) {
    if (!files.length) {
      fileStatusSub.textContent = "Aucun fichier sélectionné";
      return;
    }

    if (files.length === 1) {
      fileStatusSub.textContent = files[0].name;
    } else {
      fileStatusSub.textContent = `${files.length} fichiers sélectionnés`;
    }
  }

  sendBtn.addEventListener("click", () => {
    const pseudo = document.getElementById("pseudo").value.trim();
    if (!pseudo) return toast("Entrez un pseudo.", "error");
    if (!fileInput.files.length) return toast("Choisissez un fichier.", "error");

    setLoading(sendBtn, true);

    setTimeout(() => {
      setLoading(sendBtn, false);
      toast("Fichier envoyé à " + pseudo + " ✔", "success");
    }, 1200);
  });
</script>

</body>
</html>
