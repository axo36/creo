<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vérification...</title>
</head>
<body>
  <h2>Vérification de votre email...</h2>

  <script type="module">
    import { supabase } from "./app.js";

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
      document.body.innerHTML = "<h3>Lien invalide.</h3>";
    } else {
      const { data, error } = await supabase
        .from("email_verification")
        .select("*")
        .eq("token", token)
        .single();

      if (error || !data) {
        document.body.innerHTML = "<h3>Lien invalide ou expiré.</h3>";
      } else {
        await supabase
          .from("profiles")
          .update({ email_verified: true })
          .eq("id", data.user_id);

        document.body.innerHTML = "<h3>Email confirmé ! Redirection...</h3>";
        setTimeout(() => window.location.href = "login.html", 1500);
      }
    }
  </script>
</body>
</html>
